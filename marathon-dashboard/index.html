<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marathon Dashboard</title>

<style>
body {
  font-family: system-ui;
  background:#0f0f0f;
  color:#fff;
  margin:0;
}

h1 {
  text-align:center;
  padding:12px;
}

.week {
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:12px;
}

.day {
  background:#222;
  margin-bottom:8px;
  border-radius:10px;
  padding:10px;
}

.day-title {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

input[type="checkbox"] {
  transform: scale(1.3);
}

textarea {
  width:100%;
  margin-top:8px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px;
  resize:vertical;
}

.run { color:#4caf50; }
.long { color:#ff9800; }
.cycle { color:#9c27b0; }
.rest { color:#777; }
</style>

</head>

<body>

<h1>🏃 Marathon Dashboard</h1>

<div id="calendar"></div>

<script>
const startDate = new Date("2026-03-30");
const weeks = 4; // start with 4 weeks, we can expand later

function saveData(key, value){
  localStorage.setItem(key, value);
}

function loadData(key){
  return localStorage.getItem(key) || "";
}

function createDay(date){
  const id = date.toISOString().split("T")[0];

  return `
  <div class="day">
    <div class="day-title">
      <span>${date.toDateString()}</span>
      <input type="checkbox" onchange="saveData('${id}-done', this.checked)" ${loadData(id+"-done")==="true"?"checked":""}>
    </div>

    <div>
      <span class="run">Run / Long / Cycle / Strength</span>
    </div>

    <textarea placeholder="Notes (meals, feeling, etc)" 
      oninput="saveData('${id}-notes', this.value)">
      ${loadData(id+"-notes")}
    </textarea>
  </div>`;
}

let html = "";

for(let w=0; w<weeks; w++){
  html += `<div class="week"><h2>Week ${w+1}</h2>`;

  for(let d=0; d<7; d++){
    let date = new Date(startDate);
    date.setDate(startDate.getDate() + (w*7 + d));
    html += createDay(date);
  }

  html += `</div>`;
}

document.getElementById("calendar").innerHTML = html;
</script>

</body>
</html>
