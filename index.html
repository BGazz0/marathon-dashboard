<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Calendar</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b0f14;
  color: #fff;
}

h1 {
  text-align: center;
  padding: 16px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: #121826;
  border-radius: 12px;
  padding: 10px;
  min-height: 260px;
  display: flex;
  flex-direction: column;
}

.day h3 {
  margin: 0 0 8px 0;
  font-size: 14px;
  text-align: center;
  color: #9ca3af;
}

.block {
  flex: 1;
  margin-bottom: 6px;
}

.block label {
  font-size: 11px;
  color: #60a5fa;
}

textarea {
  width: 100%;
  height: 40px;
  resize: none;
  border: none;
  border-radius: 6px;
  padding: 4px;
  background: #0f172a;
  color: white;
  font-size: 12px;
}

.checkbox {
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
}

input[type="checkbox"] {
  transform: scale(1.1);
}

.header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
  color: #60a5fa;
}

.week {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>🏃 Training Calendar</h1>
<div id="calendar"></div>

<script>
const startDate = new Date("2026-03-30");
const totalDays = 28; // 4 weeks

const calendar = document.getElementById("calendar");

function save(key, value){
  localStorage.setItem(key, value);
}

function load(key){
  return localStorage.getItem(key) || "";
}

function createBlock(dateKey, label){
  return `
  <div class="block">
    <label>${label}</label>
    <textarea oninput="save('${dateKey}-${label}', this.value)">${load(dateKey + "-" + label)}</textarea>
    <div class="checkbox">
      <input type="checkbox" onchange="save('${dateKey}-${label}-done', this.checked)" ${load(dateKey + "-" + label + "-done") === "true" ? "checked" : ""}>
      Done
    </div>
  </div>`;
}

let weekHTML = "";

for(let i = 0; i < totalDays; i++){
  let date = new Date(startDate);
  date.setDate(startDate.getDate() + i);

  let key = date.toISOString().split("T")[0];

  let dayHTML = `
  <div class="day">
    <h3>${date.toDateString()}</h3>

    ${createBlock(key, "Morning")}
    ${createBlock(key, "Lunch")}
    ${createBlock(key, "Post-Work")}
    ${createBlock(key, "Night")}
  </div>`;

  weekHTML += dayHTML;
}

calendar.innerHTML = `<div class="calendar">${weekHTML}</div>`;
</script>

</body>
</html>
